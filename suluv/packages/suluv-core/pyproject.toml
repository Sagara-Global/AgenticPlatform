[project]
name = "suluvai"
version = "0.2.0"
description = "SuluvAI — Agentic Business Process Framework with Graph Engine, Agent Orchestration & Process Engine"
requires-python = ">=3.11"
dependencies = []
readme = "README.md"
license = {text = "MIT"}
authors = [
    {name = "SagaraGlobal", email = "info@sagaraglobal.com"},
]
keywords = ["agents", "orchestration", "bpm", "graph-engine", "llm", "agentic", "workflow", "process-engine", "multi-agent"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Typing :: Typed",
]

[project.urls]
Homepage = "https://github.com/sagaraglobal/suluvai"
Documentation = "https://github.com/sagaraglobal/suluvai"
Repository = "https://github.com/sagaraglobal/suluvai"
Changelog = "https://github.com/sagaraglobal/suluvai/blob/main/CHANGELOG.md"

[project.optional-dependencies]
dev = ["pytest>=8.0", "pytest-asyncio>=0.23"]
openai = ["openai>=1.0"]
anthropic = ["anthropic>=0.30"]
gemini = ["google-genai>=1.0"]
llm = ["openai>=1.0", "anthropic>=0.30", "google-genai>=1.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/suluv"]
